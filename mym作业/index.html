    <style>
        * {
            padding: 0;

        }

        ul,

        }

        body {

        .nav {
            width: 100%;
            height: 60px;
            position: fixed;
            top: 0;
            z-index: 2;
            background-color: #398dfa;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav .nav_container {
            width: 100%;
            flex-direction: flex;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav .right {
            display: flex;
            gap: 25px;
        }

        .nav .item {
            width: 80px;
            height: 100%;
            color: inherit;
            text-decoration: none;
            text-align: center;
            font-size: 16px;

        }

        .nav .item:hover {
            color: rgb(40, 104, 104);
        }

        .nav .logo {
            height: 100%;
            color: inherit;
            text-decoration: none;
        }

        .lbt {
            width: 100%;
            height: 500px;
            margin: 60px auto;
            overflow: hidden;
            position: relative;
        }

        .lbt1 {
            width: 100vw;
            height: 100%;
            display: flex;
            flex-direction: row;
            transition: transform 0.5s ease;
        }

        .lbt1 .item {
            width: 100vw;
            flex-shrink: 0;
            height: 100%;
            background-color: #333;

        }

        .lbt img {
            width: 100%;
            height: 100%;
        }

        .lbt .prev,
        .lbt .next {
            position: absolute;
            padding: auto;
            top: 50%;
            z-index: 1;
            transform: translateY(-50%);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: rgb(4, 142, 255);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lbt .prev {
            left: 20px;
        }

        .lbt .next {
            right: 20px;
        }

        .lbt .points {
            position: absolute;
            bottom: 20px;
            z-index: 1;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .lbt .point {
            width: 10px;
            height: 10px;
            border: 2px solid rgb(255, 255, 255);
            border-radius: 50%;
            cursor: pointer;
        }

        .lbt .point.active {
            background-color: rgb(255, 255, 255);
        }

        .container {
            width: 1200px;
            margin: 100px auto;
        }

        .container h3 {
            font-size: 26px;
        }

        .container h3 span {
            font-size: 14px;
            color: #505050;
        }

        .container ul {
            display: flex;
            /* 指定为容器 */
            margin: 50px 0;
            flex-wrap: wrap;
            gap: 20px;

        }

        .container ul li {
            background-color: #a0a0a016;
            padding-bottom: 20px;
            border-radius: 10px;
            width: calc(25% - 20px);
            overflow: hidden;
            margin-top: 20px;
        }

        .container ul li .item {
            height: 100px;
            padding: 20px;
        }

        .container ul li a {
            color: inherit;
            text-decoration: none;
        }

        .container ul li img {
            width: 100%;
            height: 200px;
            /* 图片自适应父元素大小 */
            height: auto;
        }

        .container ul li h4 {
            font-size: 16px;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        .container ul li span {
            font-size: 14px;
        }
    </style>

</head>

<script>
    let lbt = document.querySelector('.lbt');
    let lbt1 = document.querySelector('.lbt1');
    let prev = document.querySelector('.prev');
    let next = document.querySelector('.next');
    let points = document.querySelector('.points');
    let imglength = document.querySelectorAll('.lbt .lbt1 img').length;
    let index = 0;


    //初始化小圆点
    function initPoint() {
        for (let i = 0; i < imglength; i++) {
            let point = document.createElement('div');
            point.classList.add('point');
            points.appendChild(point);
        }
        document.querySelector('.point').classList.add('active');
    }

    //更新轮播图
    function updata(index) {
        document.querySelector('.point.active').classList.remove('active');
        let point = document.querySelectorAll('.point');
        console.log(point);
        point[index].classList.add('active');
        lbt1.style.transform = 'translateX(-' + (index) * 100 + '%)';
    }

    initPoint();
    updata(index);

    //点击上一个
    prev.addEventListener('click', () => {
        if (index == 1) {
            return;
        } else {
            index = (index - 1 + imglength) % imglength;
            updata(index);
        }
    });

    //点击下一个
    next.addEventListener('click', () => {
        if (index == imglength) {
            return;
        } else {
            index = (index + 1 + imglength) % imglength;
            updata(index);
        }
    });

    //点击小圆点
    let point = document.querySelectorAll('.point');
    point.forEach((v, i) => {
        v.addEventListener('click', () => {
            updata(index);
        });
    });

    //定时自动播放
    let timer = setInterval(() => next.click(), 500);

    lbt.addEventListener('mouseenter', () => clearInterval(timer));
    lbt.addEventListener('mouseleave', () => {
        timer = setInterval(() => next.click(), 800);
    });


</script>
