<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image to ASCII</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 1000px;
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 2px;
        }
        .controls {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }
        label {
            font-size: 0.85rem;
            color: #aaa;
        }
        input[type="number"], select {
            background: #3d3d3d;
            border: 1px solid #555;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
        }
        input[type="range"] {
            width: 120px;
        }
        .checkbox-group {
            flex-direction: row;
            align-items: center;
            gap: 8px;
            padding-top: 18px; /* Align with inputs */
        }
        .checkbox-group label {
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
        }
        input[type="file"] {
            background: #333;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        #output-wrapper {
            width: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            background: #000;
            border-radius: 4px;
            padding: 10px;
            box-sizing: border-box;
            min-height: 200px;
            align-items: center;
        }
        #output {
            font-family: 'Courier New', Courier, monospace;
            white-space: pre;
            font-size: 10px; /* Base size, will be scaled */
            line-height: 0.6em; /* Tight line height for better aspect ratio */
            background: transparent;
            padding: 0;
            border-radius: 0;
            overflow: visible;
            width: auto;
            transform-origin: center center;
            text-align: left;
            display: inline-block;
            color: #fff;
        }
        /* Remove has-content class styling as wrapper handles it */
    </style>
</head>
<body>
    <div class="container">
        <h1>ASCII ART GENERATOR</h1>
        
        <div class="controls">
            <div class="control-group">
                <label>Image Source</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            
            <div class="control-group">
                <label for="widthInput">Width (chars)</label>
                <input type="number" id="widthInput" value="150" min="20" max="800">
            </div>

            <div class="control-group">
                <label for="modeSelect">Render Mode</label>
                <select id="modeSelect">
                    <option value="standard" selected>Standard</option>
                    <option value="edge">Abstract Edges</option>
                </select>
            </div>

            <div class="control-group" id="presetGroup">
                <label for="presetSelect">Detail Level</label>
                <select id="presetSelect">
                    <option value="simple">Simple (10 chars)</option>
                    <option value="complex" selected>Complex (70 chars)</option>
                </select>
            </div>

            <div class="control-group" id="contrastGroup">
                <label for="contrastInput">Contrast</label>
                <input type="range" id="contrastInput" min="-100" max="100" value="0">
            </div>

            <div class="control-group" id="thresholdGroup" style="display:none;">
                <label for="thresholdInput">Edge Threshold</label>
                <input type="range" id="thresholdInput" min="10" max="800" value="100">
            </div>

            <div class="control-group checkbox-group">
                <input type="checkbox" id="colorCheck">
                <label for="colorCheck">Color</label>
            </div>

            <div class="control-group checkbox-group">
                <input type="checkbox" id="invertCheck">
                <label for="invertCheck">Invert</label>
            </div>
        </div>

        <div id="output-wrapper">
            <div id="output">Upload an image to start...</div>
        </div>
    </div>

    <script src="ascii.js"></script>
    <script>
        const imageInput = document.getElementById('imageInput');
        const widthInput = document.getElementById('widthInput');
        const modeSelect = document.getElementById('modeSelect');
        const presetSelect = document.getElementById('presetSelect');
        const contrastInput = document.getElementById('contrastInput');
        const thresholdInput = document.getElementById('thresholdInput');
        const colorCheck = document.getElementById('colorCheck');
        const invertCheck = document.getElementById('invertCheck');
        const output = document.getElementById('output');
        const outputWrapper = document.getElementById('output-wrapper');
        
        const presetGroup = document.getElementById('presetGroup');
        const contrastGroup = document.getElementById('contrastGroup');
        const thresholdGroup = document.getElementById('thresholdGroup');

        let currentImage = null;

        // Event Listeners
        imageInput.addEventListener('change', handleImageUpload);
        
        modeSelect.addEventListener('change', () => {
            const isEdge = modeSelect.value === 'edge';
            
            if (isEdge) {
                presetGroup.style.display = 'none';
                contrastGroup.style.display = 'none'; // Edge mode calculates its own contrast basically, but we could keep it.
                // Actually our Edge implementation uses contrast adjustment BEFORE edge detection, so it's useful!
                // Let's keep Contrast visible for Edge mode too as it helps detect edges in low contrast images.
                contrastGroup.style.display = 'flex'; 
                thresholdGroup.style.display = 'flex';
            } else {
                presetGroup.style.display = 'flex';
                contrastGroup.style.display = 'flex';
                thresholdGroup.style.display = 'none';
            }
            updateOutput();
        });

        // Add listeners to all controls to trigger update
        [widthInput, presetSelect, contrastInput, thresholdInput, colorCheck, invertCheck].forEach(el => {
            el.addEventListener('input', updateOutput);
        });

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    updateOutput();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function updateOutput() {
            if (!currentImage) return;

            // Reset transform to measure correctly
            output.style.transform = 'none';
            output.innerHTML = 'Processing...'; 

            requestAnimationFrame(() => {
                const options = {
                    width: parseInt(widthInput.value, 10),
                    preset: presetSelect.value,
                    contrast: parseInt(contrastInput.value, 10),
                    color: colorCheck.checked,
                    invert: invertCheck.checked,
                    mode: modeSelect.value,
                    threshold: parseInt(thresholdInput.value, 10)
                };

                const result = AsciiArt.convert(currentImage, options);

                if (options.color) {
                    output.innerHTML = result;
                } else {
                    output.textContent = result;
                }

                // Fit to screen logic
                fitOutput();
            });
        }

        function fitOutput() {
            // Wait for render
            requestAnimationFrame(() => {
                const wrapperWidth = outputWrapper.clientWidth - 40; // minus padding
                const contentWidth = output.scrollWidth;
                const contentHeight = output.scrollHeight;
                
                if (contentWidth > 0) {
                    let scale = 1;
                    // Only scale down if content is larger than wrapper
                    // Or if user wants to zoom out huge images? 
                    // Actually, if we want it "in screen", we should scale down.
                    if (contentWidth > wrapperWidth) {
                        scale = wrapperWidth / contentWidth;
                    }
                    
                    // Optional: also fit height to viewport? 
                    // Let's stick to width fitting as requested ("no horizontal scroll")
                    
                    if (scale !== 1) {
                        output.style.transform = `scale(${scale})`;
                        
                        // Adjust margins to compensate for scale shrinking the visual space but not layout space
                        // When scaling down, the element takes up less space visually, but occupies same layout space unless adjusted.
                        // Actually, transform doesn't affect flow. So we need to negative margin?
                        // Or better: wrapper is flex center.
                        // We need to set the wrapper height to match the scaled height.
                        
                        const scaledHeight = contentHeight * scale;
                        const scaledWidth = contentWidth * scale;
                        
                        // We can set explicit width/height on output to force container to shrink? No.
                        // We can set wrapper height.
                        // But flex centering might look weird if we don't adjust.
                        
                        // Simple fix: set margins on output to negative values?
                        // Or just set output width/height? No.
                        
                        // Let's just use Zoom property? No, standard is transform.
                        
                        // Trick: Set width/height of a container based on scaled size?
                        // Actually, since we use Flex center, scaling from center works well visually.
                        // But the wrapper might be too tall.
                        outputWrapper.style.height = `${scaledHeight + 40}px`; // + padding
                        
                        // If we scale from center, we don't need to adjust position.
                    } else {
                        output.style.transform = 'none';
                        outputWrapper.style.height = 'auto';
                    }
                }
            });
        }
        
        // Re-fit on window resize
        window.addEventListener('resize', fitOutput);
    </script>
</body>
</html>
